<!DOCTYPE html>
<html>
<head>
<title>Login - RentEasy</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body { font-family: Arial; padding: 20px; }
input { width: 100%; padding: 12px; margin: 10px 0; }
button { width: 100%; padding: 12px; background: blue; color: white; }
</style>
</head>

<body>

<h2>Login / Signup</h2>

<input id="email" type="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">

<button onclick="signup()">Sign Up</button>
<button onclick="login()">Login</button>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const supabaseUrl = "https://onwgfczqjuiasuqnopeh.supabase.co";
const supabaseKey = "sb_publishable_3PbuC2qrGFLhykHnxJ8GfQ_J7rwARww";
const client = supabase.createClient(supabaseUrl, supabaseKey);

// SIGN UP
async function signup() {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  const { data, error } = await client.auth.signUp({
    email,
    password
  });

  if (error) alert(error.message);
  else alert("Check your email to confirm account!");
}

// LOGIN
async function login() {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  const { data, error } = await client.auth.signInWithPassword({
    email,
    password
  });

  if (error) alert(error.message);
  else {
    alert("Login successful!");
    window.location.href = "index.html";
  }
}
</script>

</body>
</html>
