<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Available Rooms</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Supabase -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
      background: #f5f5f5;
    }

    nav {
      background: #222;
      padding: 10px;
      text-align: center;
    }

    nav a {
      color: white;
      margin: 0 10px;
      text-decoration: none;
      font-weight: bold;
    }

    h1 {
      text-align: center;
    }

    input {
      width: 100%;
      padding: 10px;
      margin: 10px 0;
      border-radius: 5px;
      border: 1px solid #ccc;
    }

    button {
      width: 100%;
      padding: 12px;
      background: #2d6cdf;
      color: white;
      border: none;
      border-radius: 5px;
      font-size: 16px;
    }

    .room-card {
      background: white;
      padding: 15px;
      margin-top: 15px;
      border-radius: 8px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }

    .room-card a {
      display: inline-block;
      margin-top: 10px;
      background: green;
      color: white;
      padding: 8px 12px;
      border-radius: 5px;
      text-decoration: none;
    }
  </style>
</head>

<body>

  <nav>
    <a href="index.html">Home</a>
    <a href="postroom.html">Post Room</a>
  </nav>

  <h1>🏠 Available Rooms</h1>

  <input id="search" type="text" placeholder="Search location or title">
  <input id="maxRent" type="number" placeholder="Max rent (e.g. 10000)">

  <button onclick="loadRooms()">Search</button>

  <div id="listings"></div>

  <!-- SCRIPT (VERY IMPORTANT: KEEP THIS AT BOTTOM) -->
  <script>
    const supabaseUrl = "https://onwgfczqjuiasuqnopeh.supabase.co";
    const supabaseKey = "sb_publishable_3PbuC2qrGFLhykHnxJ8GfQ_J7rwARww";
    const client = supabase.createClient(supabaseUrl, supabaseKey);

    async function loadRooms() {
      const search = document.getElementById("search").value.toLowerCase();
      const maxRent = document.getElementById("maxRent").value;

      const { data, error } = await client
        .from("rooms")
        .select("*")
        .order("id", { ascending: false });

      if (error) {
        document.getElementById("listings").innerHTML = "Error: " + error.message;
        return;
      }

      let filtered = data.filter(room =>
        room.title.toLowerCase().includes(search) ||
        room.location.toLowerCase().includes(search)
      );

      if (maxRent) {
        filtered = filtered.filter(room =>
          Number(room.rent) <= Number(maxRent)
        );
      }

      let html = "";

      if (filtered.length === 0) {
        html = "<p>No rooms found.</p>";
      } else {
        filtered.forEach(room => {
          html += `
            <div class="room-card">
              <h3>${room.title}</h3>
              <p><strong>Location:</strong> ${room.location}</p>
              <p><strong>Rent:</strong> KES ${room.rent}</p>
              <p>${room.description || ""}</p>
              <a href="https://wa.me/${room.whatsapp}" target="_blank">
                Contact on WhatsApp
              </a>
            </div>
          `;
        });
      }

      document.getElementById("listings").innerHTML = html;
    }

    // Auto load on page open
    loadRooms();
  </script>

</body>
</html>
