<script>
const supabaseUrl = "https://onwgfczqjuiasuqnopeh.supabase.co";
const supabaseKey = "sb_publishable_3PbuC2qrGFLhykHnxJ8GfQ_J7rwARww";

// FIXED: correct client name

</iframe>}</p>

<script>
const supabaseUrl = "https://onwgfczqjuiasuqnopeh.supabase.co";
const supabaseKey = "YOUR_KEY";
const client = supabase.createClient(supabaseUrl, supabaseKey);

async function loadRooms() {
  const search = document.getElementById("search").value.toLowerCase();
  const maxRent = document.getElementById("maxRent").value;

  let query = client
    .from("rooms")
    .select("*")
    .order("id", { ascending: false });

  const { data, error } = await query;

  let html = "";

  if (error) {
    document.getElementById("listings").innerHTML = "Error: " + error.message;
    return;
  }

  let filtered = data.filter(room =>
    room.title.toLowerCase().includes(search) ||
    room.location.toLowerCase().includes(search)
  );

  if (maxRent) {
    filtered = filtered.filter(room => Number(room.rent) <= Number(maxRent));
  }

  if (filtered.length === 0) {
    html = "No rooms found.";
  } else {
    filtered.forEach(room => {
      html += `
        <div>
          <h3>${room.title}</h3>
          <p>${room.location}</p>
          <p>KES ${room.rent}</p>
        </div>
      `;
    });
  }

  document.getElementById("listings").innerHTML = html;
}
</script>
</script>

</body>
</html>
