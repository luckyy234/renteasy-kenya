<h2>TEST VERSION 2</h2>
<!DOCTYPE html>
<html>
<head>
  <title>RentEasy Kenya</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Supabase (ONLY ONCE) -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    body {
      font-family: Arial;
      background: #f5f5f5;
      padding: 20px;
    }

    .nav {
      text-align: center;
      background: #222;
      padding: 15px;
    }

    .nav a {
      color: white;
      margin: 10px;
      text-decoration: none;
      font-weight: bold;
    }

    h1 {
      text-align: center;
    }

    input {
      width: 100%;
      padding: 10px;
      margin: 8px 0;
      border-radius: 5px;
      border: 1px solid #ccc;
    }

    button {
      width: 100%;
      background: #2563EB;
      color: white;
      padding: 12px;
      border: none;
      border-radius: 5px;
      font-size: 16px;
    }

    .card {
      background: white;
      padding: 15px;
      margin: 15px 0;
      border-radius: 8px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }

    .whatsapp-btn {
      display: inline-block;
      margin-top: 10px;
      background: green;
      color: white;
      padding: 10px;
      border-radius: 5px;
      text-decoration: none;
    }

    iframe {
      margin-top: 10px;
      border-radius: 8px;
    }
  </style>
</head>

<body>

  <!-- NAV -->
  <div class="nav">
    <a href="index.html">Home</a>
    <a href="post-room.html">Post Room</a>
  </div>

  <!-- TITLE -->
  <h1>🏠 Available Rooms</h1>

  <!-- SEARCH -->
  <input id="search" type="text" placeholder="Search location or title">
  <input id="maxRent" type="number" placeholder="Max rent (e.g. 10000)">
  <button onclick="loadRooms()">Search</button>

  <!-- LISTINGS -->
  <div id="listings"></div>

  <!-- SCRIPT (ONLY ONE BLOCK) -->
  <script>
    const supabaseUrl = "https://onwgfczqjuiasuqnopeh.supabase.co";
    const supabaseKey = "sb_publishable_3PbuC2qrGFLhykHnxJ8GfQ_J7rwARww";
    const client = supabase.createClient(supabaseUrl, supabaseKey);

    async function loadRooms() {
      const search = document.getElementById("search").value.toLowerCase();
      const maxRent = document.getElementById("maxRent").value;

      const { data, error } = await client
        .from("rooms")
        .select("*")
        .order("id", { ascending: false });

      if (error) {
        document.getElementById("listings").innerHTML =
          "Error loading rooms: " + error.message;
        return;
      }

      let filtered = data.filter(room =>
        room.title.toLowerCase().includes(search) ||
        room.location.toLowerCase().includes(search)
      );

      if (maxRent) {
        filtered = filtered.filter(room =>
          Number(room.rent) <= Number(maxRent)
        );
      }

      let html = "";

      if (filtered.length === 0) {
        html = "<p>No rooms found.</p>";
      } else {
        filtered.forEach(room => {
          html += `
            <div class="card">
              <h3>${room.title}</h3>
              <p>📍 ${room.location}</p>
              <p>💰 KES ${room.rent}</p>
              <p>${room.description || ""}</p>

              <iframe
                width="100%"
                height="200"
                loading="lazy"
                src="https://www.google.com/maps?q=${encodeURIComponent(room.location)}&output=embed">
              </iframe>

              <a class="whatsapp-btn"
                 href="https://wa.me/${room.whatsapp}?text=Hi%20I%20am%20interested%20in%20your%20room%20(${room.title})"
                 target="_blank">
                 Contact on WhatsApp
              </a>
            </div>
          `;
        });
      }

      document.getElementById("listings").innerHTML = html;
    }

    // AUTO LOAD
    loadRooms();
  </script>

</body>
</html>
